<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>预约已确认</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "inverse-primary": "#afd0a1",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#dde5da",
                        "surface-container": "#efeeeb",
                        "inverse-on-surface": "#f2f1ee",
                        "tertiary-fixed-dim": "#c1c9be",
                        "primary": "#334f2b",
                        "tertiary": "#424a42",
                        "on-primary": "#ffffff",

                        "primary-fixed-dim": "#afd0a1",
                        "on-tertiary-fixed": "#161d17",
                        "secondary": "#6e5b43",

                        "secondary-fixed": "#f8dfbf",
                        "surface-container-low": "#f4f3f1",

                    "borderRadius": {

                    "spacing": {

                        "unit": "4px",

                        "gutter": "16px"
                    },
                    "fontFamily": {

                        "label-lg": ["Manrope"],
                        "body-sm": ["Manrope"],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased">
<!-- TopAppBar: Transactional, so navigation shell is suppressed, just the TopAppBar is shown as a header -->
<header class="fixed top-0 w-full z-50 bg-stone-50/80 dark:bg-stone-950/80 backdrop-blur-md border-b border-[#4A6741]/10 dark:border-[#8BA882]/10 flat no shadows flex justify-between items-center px-6 h-16 w-full">
<button class="text-[#4A6741] dark:text-[#8BA882] hover:opacity-80 transition-opacity Active: scale-95 transition-transform flex items-center justify-center p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="text-lg font-semibold text-[#4A6741] dark:text-[#8BA882] font-serif tracking-tight">预约已确认</h1>
<div class="w-10 h-10"></div> <!-- Placeholder for balance -->
</header>
<main class="flex-grow pt-24 px-margin-page pb-stack-lg flex flex-col items-center justify-center">
<!-- Success Animation/Icon Area -->
<div class="mb-stack-md flex flex-col items-center">
<div class="w-24 h-24 rounded-full bg-primary-container/10 flex items-center justify-center mb-stack-sm">
<span class="material-symbols-outlined text-primary-container text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-center text-primary">预约成功</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-unit max-w-sm">您的自然之旅已预订成功。我们期待您的光临。</p>
</div>
<!-- Booking Details Card (Glassmorphism/Minimalist) -->
<div class="w-full max-w-md bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-stack-md shadow-[0_20px_40px_-15px_rgba(74,103,65,0.03)] relative overflow-hidden mb-stack-lg">
<!-- Subtle decorative background element -->
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary-container/20 rounded-full blur-3xl -mr-10 -mt-10"></div>
<h3 class="font-headline-sm text-headline-sm text-primary mb-stack-sm border-b border-outline-variant/30 pb-unit relative z-10">森林徒步</h3>
<ul class="space-y-4 relative z-10">
<li class="flex justify-between items-center">
<div class="flex items-center text-on-surface-variant">
<span class="material-symbols-outlined mr-2 text-primary/70 text-sm">calendar_today</span>
<span class="font-body-sm text-body-sm">日期</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">2023年10月15日</span>
</li>
<li class="flex justify-between items-center">
<div class="flex items-center text-on-surface-variant">
<span class="material-symbols-outlined mr-2 text-primary/70 text-sm">schedule</span>
<span class="font-body-sm text-body-sm">时间</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">09:00 AM - 12:00 PM</span>
</li>
<li class="flex justify-between items-center">
<div class="flex items-center text-on-surface-variant">
<span class="material-symbols-outlined mr-2 text-primary/70 text-sm">group</span>
<span class="font-body-sm text-body-sm">人数</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium">2 位成人</span>
</li>
<li class="flex justify-between items-center pt-unit border-t border-outline-variant/20">
<div class="flex items-center text-on-surface-variant">
<span class="material-symbols-outlined mr-2 text-primary/70 text-sm">confirmation_number</span>
<span class="font-body-sm text-body-sm">预约 ID</span>
</div>
<span class="font-body-md text-body-md text-on-surface font-medium tracking-wider">#FT-8924</span>
</li>
</ul>
</div>
<!-- Action Buttons -->
<div class="w-full max-w-md flex flex-col gap-stack-sm pb-8">
<button class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-4 rounded-lg hover:bg-on-primary-fixed-variant transition-colors duration-300 shadow-[0_4px_14px_0_rgba(51,79,43,0.15)] flex justify-center items-center">查看订单详情</button>
<button class="w-full border border-outline-variant bg-transparent text-on-surface font-label-lg text-label-lg py-4 rounded-lg hover:bg-surface-container-high transition-colors duration-300 flex justify-center items-center">返回首页</button>
</div>
</main>
<!-- BottomNavBar is suppressed on transactional/success screens -->
</body></html>
